    <main>
        <h1>Prenota</h1>

        <form>
            <label for="nome">Nome</label>
            <input id="nome" type="text" name="nome" required>

            <label for="email">Email</label>
            <input id="email" type="email" name="email" required>

            <label for="evento">Seleziona l'evento</label>
            <select name="evento" id="evento">
                <option value="Assassina">Assassina</option>
                <option value="Karaoke">Karaoke</option>
                <option value="Fritti e cocktail">Fritti e cocktail</option>
            </select>

            <label for="data">Data</label>
            <input id="data" type="date" name="data" required>

            <label for="persone">Numero di persone</label>
            <input id="persone" type="number" name="persone" min="1" required>

            <input type="submit" value="Prenota">
        </form>
    </main>
